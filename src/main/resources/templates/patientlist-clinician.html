<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Patient List - DentIS</title>
    <link rel="stylesheet" href="/css/patientlist-clinician.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>
<div class="background"></div>
<div class="patientlist-clinician">
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <div class="logo">
                <div class="menu-icon">&#9776;</div>
                <img src="/images/UPMlogo.png" alt="UPM Logo" class="upm-logo">
                <h1>DentIS</h1>
            </div>
        </div>
        <div class="header-right">
            <div class="user-profile">
                <div class="user-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                        <path d="M12 12C14.21 12 16 10.21 16 8C16 5.79 14.21 4 12 4C9.79 4 8 5.79 8 8C8 10.21 9.79 12 12 12Z" fill="currentColor"/>
                        <path d="M12 14C7.59 14 4 17.59 4 22H20C20 17.59 16.41 14 12 14Z" fill="currentColor"/>
                    </svg>
                </div>

                <span class="username" th:text="${currentUser != null ? currentUser.firstName + ' ' + currentUser.lastName + ' (' + currentUser.role.displayName + ')' : 'Guest'}">User</span>

                <div class="dropdown-icon">▼</div>
                
                <!-- Dropdown Menu -->
                <div class="user-dropdown">
                    <a href="/logout" class="dropdown-item">Logout</a>
                </div>
            </div>
        </div>
    </header>

    <div class="main-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <nav class="nav-menu">
                <ul>
                    <li class="nav-item">
                        <a href="/clinician-dashboard" class="nav-link">
                            <img src="/images/home-icon.png" alt="Home" class="nav-icon">
                            <span>Home</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/chartrequest-clinician" class="nav-link">
                            <img src="/images/request-icon.png" alt="Chart" class="nav-icon2">
                            <span>Chart Request</span>
                        </a>
                    </li>
                    <li class="nav-item active">
                        <a href="/patient-list-clinician" class="nav-link">
                            <img src="/images/patient-icon.png" alt="Patient" class="nav-icon">
                            <span>Patient List</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Patient List Section -->
            <section class="section">
                <div class="section-header">
                    <h2>Patient List</h2>
                </div>
                <div class="table-container">
                    <table class="patient-table">
                        <thead>
                            <tr>
                                <th>Chart Number</th>
                                <th>Patient Name</th>
                                <th>Contact Number</th>
                                <th>Email</th>
                                <th>Assigned Clinician</th>
                                <th>Patient Charts</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="req : ${approvedRequests}">
                                <td th:text="${req.patient.chartNo}"></td>
                                <td th:text="${req.patient.surname + ', ' + req.patient.firstName + (req.patient.middleInitial != null ? ' ' + req.patient.middleInitial + '.' : '')}"></td>
                                <td th:text="${req.patient.contactNumber}"></td>
                                <td th:text="${req.patient.email}"></td>
                                <td th:text="${req.clinician != null ? req.clinician.fullName : '—'}"></td>
                                <td>
                                    <a th:href="@{/chartsview-clinician/{id}(id=${req.patient.id})}" class="btn-view-chart">View</a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(approvedRequests)}">
                                <td colspan="6" style="text-align:center; color:#888;">No approved patients yet.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
</div>

<script>
document.querySelector('.menu-icon').onclick = function() {
    document.querySelector('.sidebar').classList.toggle('expanded');
};

// Dropdown functionality
document.querySelector('.dropdown-icon').onclick = function(e) {
    e.stopPropagation();
    const dropdown = document.querySelector('.user-dropdown');
    dropdown.classList.toggle('show');
};

// Close dropdown when clicking outside
document.addEventListener('click', function() {
    const dropdown = document.querySelector('.user-dropdown');
    if (dropdown.classList.contains('show')) {
        dropdown.classList.remove('show');
    }
});

// Prevent dropdown from closing when clicking inside
document.querySelector('.user-dropdown').addEventListener('click', function(e) {
    e.stopPropagation();
});
</script>

</body>
</html>
