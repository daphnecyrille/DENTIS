<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chart Request - DentIS</title>
    <link rel="stylesheet" href="/css/chartrequest-clinician.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

    <body>

        <div class="background"></div>

        <div class="chartrequest-clinician">

            <!-- HEADER -->
            <header class="header">
                <div class="header-left">
                    <div class="logo">
                        <div class="menu-icon">&#9776;</div>
                        <img src="/images/UPMlogo.png" class="upm-logo">
                        <h1>DentIS</h1>
                    </div>
                </div>

                <div class="header-right">
                    <div class="user-profile">
                        <div class="user-icon">
                            <svg width="22" height="22" viewBox="0 0 24 24">
                                <path d="M12 12C14.21 12 16 10.21 16 8C16 5.79 14.21 4 12 4C9.79 4 8 5.79 8 8C8 10.21 9.79 12 12 12Z" fill="white"/>
                                <path d="M12 14C7.59 14 4 17.59 4 22H20C20 17.59 16.41 14 12 14Z" fill="white"/>
                            </svg>
                        </div>

                        <span class="username" th:text="${currentUser != null ? currentUser.firstName + ' ' + currentUser.lastName + ' (' + currentUser.role.displayName + ')' : 'Guest'}">User</span>
                        <div class="dropdown-icon">▼</div>

                        <div class="user-dropdown">
                            <a href="/logout" class="dropdown-item">Logout</a>
                        </div>
                    </div>
                </div>
            </header>

            <!-- MAIN LAYOUT -->
            <div class="main-container">

                <!-- SIDEBAR -->
                <aside class="sidebar">
                    <nav class="nav-menu">
                        <ul>
                            <li class="nav-item">
                                <a href="/clinician-dashboard" class="nav-link">
                                    <img src="/images/home-icon.png" class="nav-icon">
                                    <span>Home</span>
                                </a>
                            </li>

                            <li class="nav-item active">
                                <a href="/chartrequest-clinician" class="nav-link">
                                    <img src="/images/request-icon.png" class="nav-icon2">
                                    <span>Chart Request</span>
                                </a>
                            </li>

                            <li class="nav-item">
                                <a href="/patientlist-clinician" class="nav-link">
                                    <img src="/images/patient-icon.png" class="nav-icon">
                                    <span>Patient List</span>
                                </a>
                            </li>
                        </ul>
                    </nav>
                </aside>

                <!-- MAIN CONTENT -->
                <main class="main-content">

                    <!-- CHART REQUEST FORM -->
                    <section class="section">
                        <div class="section-header">
                            <h2>Chart Request</h2>
                        </div>

                        <div class="form-container">
                            <form class="chart-form" th:action="@{/chartrequest-clinician}" th:object="${chartRequest}" method="post">
                                <!-- ROW 1 -->
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>Clinician</label>
                                        <select name="clinicianId">
                                            <option value="">Select Clinician</option>
                                            <option th:each="c : ${clinicians}" th:value="${c.id}" th:text="${c.fullName}"></option>
                                        </select>
                                    </div>

                                    <div class="form-group">
                                        <label>Date</label>
                                        <input type="date" class="date-picker" th:field="*{requestDate}">
                                    </div>

                                    <div class="form-group">
                                        <label>Purpose</label>
                                        <input type="text" th:field="*{purpose}" placeholder="Purpose">
                                    </div>
                                </div>

                                <!-- ROW 2 -->
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>Chart No.</label>
                                        <input type="text" th:field="*{chartNo}" placeholder="Chart No.">
                                    </div>

                                    <div class="form-group">
                                        <label>Name of Patient</label>
                                        <input type="text" th:field="*{patientName}" placeholder="Name of Patient">
                                    </div>

                                    <div class="form-group">
                                        <label>Section</label>
                                        <select th:field="*{section}">
                                            <option value="">Select Section</option>
                                            <option value="Resto">Resto</option>
                                            <option value="FPD">FPD</option>
                                            <option value="PEDO">PEDO</option>
                                            <option value="CD">CD</option>
                                            <option value="RPD">RPD</option>
                                            <option value="ENDO">ENDO</option>
                                            <option value="PERIO">PERIO</option>
                                            <option value="OS">OS</option>
                                            <option value="Ortho">Ortho</option>
                                        </select>
                                    </div>

                                    <div class="form-group">
                                        <button type="submit" class="btn-submit">
                                            Submit Request
                                        </button>
                                    </div>
                                </div>

                            </form>
                        </div>
                    </section>

                    <!-- REQUEST LIST SECTION -->
                    <section class="section">
                        <div class="section-header">
                            <h2>Request List</h2>
                        </div>
                        <div class="table-container">
                            <table class="request-table">
                                <thead>
                                    <tr>
                                        <th>Requested Chart No.</th>
                                        <th>Patient Name</th>
                                        <th>Email</th>
                                        <th>Date Requested</th>
                                        <th>Request Status</th>
                                        <th></th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="req : ${requests}">
                                        <td th:text="${req.chartNo}"></td>
                                        <td th:text="${req.patientName}"></td>
                                        <td th:text="${req.patient != null ? req.patient.email : '—'}"></td>
                                        <td th:text="${req.requestDate}"></td>
                                        <td th:class="'status ' + ${req.status.cssClass}" th:text="${req.status}"></td>
                                        <td>
                                            <a th:if="${req.patient != null}"
                                               th:href="@{/admitting-view-clinician/{id}(id=${req.patient.id})}"
                                               class="btn-view-details">View Patient Details</a>
                                            <span th:if="${req.patient == null}">—</span>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(requests)}">
                                        <td colspan="6" style="text-align:center; color:#888;">No requests submitted yet.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </section>

                </main>

            </div>

        </div>

        <!-- JS -->
        <script>
        document.querySelector('.menu-icon').onclick = function() {
            document.querySelector('.sidebar').classList.toggle('expanded');
        };

        document.querySelector('.dropdown-icon').onclick = function(e) {
            e.stopPropagation();
            document.querySelector('.user-dropdown').classList.toggle('show');
        };

        document.addEventListener('click', function() {
            document.querySelector('.user-dropdown').classList.remove('show');
        });
        </script>

    </body>
</html>
