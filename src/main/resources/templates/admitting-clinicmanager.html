<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admitting Section Form - DentIS</title>
    <link rel="stylesheet" href="/css/admitting-clinicmanager.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>
<div class="background"></div>
<div class="admitting-form">
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <div class="logo">
                <div class="menu-icon">&#9776;</div>
                <img src="/images/UPMlogo.png" alt="UPM Logo" class="upm-logo">
                <h1>DentIS</h1>
            </div>
        </div>
        <div class="header-right">
            <div class="user-profile">
                <div class="user-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                        <path d="M12 12C14.21 12 16 10.21 16 8C16 5.79 14.21 4 12 4C9.79 4 8 5.79 8 8C8 10.21 9.79 12 12 12Z" fill="currentColor"/>
                        <path d="M12 14C7.59 14 4 17.59 4 22H20C20 17.59 16.41 14 12 14Z" fill="currentColor"/>
                    </svg>
                </div>
                <span class="username">dsbaui [Clinician]</span>
                <div class="dropdown-icon">▼</div>
                <div class="user-dropdown">
                    <a href="/login" class="dropdown-item">Logout</a>
                </div>
            </div>
        </div>
    </header>

    <div class="main-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <nav class="nav-menu">
                <ul>
                    <li class="nav-item">
                        <a href="/clinician-dashboard" class="nav-link">
                            <img src="/images/home-icon.png" alt="Home" class="nav-icon">
                            <span>Home</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/chartrequest-clinician" class="nav-link">
                            <img src="/images/chart-icon.png" alt="Chart" class="nav-icon2">
                            <span>Chart Request</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/patientlist-clinician" class="nav-link">
                            <img src="/images/patient-icon.png" alt="Patient" class="nav-icon">
                            <span>Patient List</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">

            <h2 class="page-title">Admitting Section Patient Form</h2>

            <!-- Form Card -->
            <div class="form-card">
                <form class="admitting-form-content">

                    <!-- Personal Information Sub-header -->
                    <div class="sub-header">Personal Information</div>

                    <!-- Registration Date + Patient No. -->
                    <div class="form-row">
                        <div class="form-group">
                            <label>Registration Date</label>
                            <input type="date" class="date-picker">
                        </div>
                        <div class="form-group">
                            <label>Patient No.</label>
                            <input type="text" placeholder="Patient No.">
                        </div>
                    </div>

                    <!-- Patient Name -->
                    <div class="form-row">
                        <div class="form-group full-width">
                            <label>Patient Name</label>
                            <div class="split-input">
                                <input type="text" placeholder="Surname">
                                <input type="text" placeholder="First Name" class="input-wide">
                                <input type="text" placeholder="M.I." class="input-narrow">
                            </div>
                        </div>
                    </div>

                    <!-- Age, Birthdate, Sex -->
                    <div class="form-row">
                        <div class="form-group">
                            <label>Age</label>
                            <input type="text" placeholder="Age">
                        </div>
                        <div class="form-group">
                            <label>Birthdate</label>
                            <input type="date" class="date-picker">
                        </div>
                        <div class="form-group">
                            <label>Sex</label>
                            <select class="select-input">
                                <option value="">Enter Sex</option>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                            </select>
                        </div>
                    </div>

                    <!-- Address -->
                    <div class="form-row">
                        <div class="form-group full-width">
                            <label>Address</label>
                            <input type="text" placeholder="Enter Address">
                        </div>
                    </div>

                    <!-- Contact Number, Email, Civil Status -->
                    <div class="form-row">
                        <div class="form-group">
                            <label>Contact Number</label>
                            <input type="tel" placeholder="Enter Contact Number">
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" placeholder="Enter Email Address">
                        </div>
                        <div class="form-group">
                            <label>Civil Status</label>
                            <select class="select-input">
                                <option value="">Civil Status</option>
                                <option value="single">Single</option>
                                <option value="married">Married</option>
                                <option value="widowed">Widowed</option>
                                <option value="divorced">Divorced</option>
                            </select>
                        </div>
                    </div>

                    <!-- Occupation, Educational Attainment -->
                    <div class="form-row">
                        <div class="form-group">
                            <label>Occupation</label>
                            <input type="text" placeholder="Value">
                        </div>
                        <div class="form-group">
                            <label>Educational Attainment</label>
                            <input type="text" placeholder="Value">
                        </div>
                    </div>

                    <!-- In case of emergency -->
                    <h3 class="section-title">In case of emergency</h3>

                    <!-- Contact Person + Relationship -->
                    <div class="form-row">
                        <div class="form-group">
                            <label>Contact Person</label>
                            <input type="text" placeholder="Surname, First Name M.I.">
                        </div>
                        <div class="form-group">
                            <label>Relationship</label>
                            <input type="text" placeholder="Value">
                        </div>
                    </div>

                    <!-- Emergency Contact Number -->
                    <div class="form-row">
                        <div class="form-group form-group-small">
                            <label>Contact Number</label>
                            <input type="tel" placeholder="Value">
                        </div>
                    </div>

                    <!-- Chief Complaint -->
                    <h3 class="section-title">Chief Complaint</h3>

                    <!-- Description -->
                    <div class="form-row">
                        <div class="form-group full-width">
                            <label>Description</label>
                            <textarea placeholder="Value" rows="3"></textarea>
                        </div>
                    </div>

                    <!-- Service Code -->
                    <div class="form-row">
                        <div class="form-group form-group-small">
                            <label>Service Code</label>
                            <select class="select-input">
                                <option value="">Select Service Code</option>
                            </select>
                        </div>
                    </div>

                    <!-- Proposed Treatment Plan -->
                    <div class="form-row">
                        <div class="form-group full-width">
                            <label>Proposed Treatment Plan</label>
                            <textarea placeholder="Enter Proposed Treatment Plan" rows="3"></textarea>
                        </div>
                    </div>

                    <!-- Submit -->
                    <div class="form-actions">
                        <button type="submit" class="btn-submit">Submit</button>
                    </div>

                </form>
            </div>
        </main>
    </div>
</div>

<script>
document.querySelector('.menu-icon').onclick = function() {
    document.querySelector('.sidebar').classList.toggle('expanded');
};

// Dropdown functionality
document.querySelector('.dropdown-icon').onclick = function(e) {
    e.stopPropagation();
    const dropdown = document.querySelector('.user-dropdown');
    dropdown.classList.toggle('show');
};

// Close dropdown when clicking outside
document.addEventListener('click', function() {
    const dropdown = document.querySelector('.user-dropdown');
    if (dropdown.classList.contains('show')) {
        dropdown.classList.remove('show');
    }
});

// Prevent dropdown from closing when clicking inside
document.querySelector('.user-dropdown').addEventListener('click', function(e) {
    e.stopPropagation();
});
</script>

</body>
</html>
