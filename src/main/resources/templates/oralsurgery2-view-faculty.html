<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Clinical Oral Surgery - Odontectomy - Faculty</title>
    <link rel="stylesheet" href="/css/oralsurgery2-clinician.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>
<div class="background"></div>
<div class="oralsurgery2-page">
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <div class="logo">
                <div class="menu-icon">&#9776;</div>
                <img src="/images/UPMlogo.png" alt="UPM Logo" class="upm-logo">
                <h1>DentIS</h1>
            </div>
        </div>
        <div class="header-right">
            <div class="user-profile">
                <div class="user-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                        <path d="M12 12C14.21 12 16 10.21 16 8C16 5.79 14.21 4 12 4C9.79 4 8 5.79 8 8C8 10.21 9.79 12 12 12Z" fill="currentColor"/>
                        <path d="M12 14C7.59 14 4 17.59 4 22H20C20 17.59 16.41 14 12 14Z" fill="currentColor"/>
                    </svg>
                </div>
                <span class="username" th:text="${currentUser != null ? currentUser.fullName + ' (' + currentUser.role.displayName + ')' : 'Guest'}">User</span>
                <div class="dropdown-icon">&#9660;</div>
                <div class="user-dropdown">
                    <a href="/logout" class="dropdown-item">Logout</a>
                </div>
            </div>
        </div>
    </header>

    <div class="main-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <nav class="nav-menu">
                <ul>
                    <li class="nav-item">
                        <a href="/faculty-dashboard" class="nav-link">
                            <img src="/images/home-icon.png" alt="Home" class="nav-icon">
                            <span>Home</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/faculty-assign" class="nav-link">
                            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M17 21V19C17 17.9 16.1 17 15 17H9C7.9 17 7 17.9 7 19V21" stroke="#333" stroke-width="2" stroke-linecap="round"/>
                                <circle cx="12" cy="11" r="3" stroke="#333" stroke-width="2"/>
                                <path d="M19 8L21 10L19 12" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M21 10H16" stroke="#333" stroke-width="2" stroke-linecap="round"/>
                            </svg>
                            <span>Assign Patients</span>
                        </a>
                    </li>
                    <li class="nav-item active">
                        <a href="/faculty-patientlist" class="nav-link">
                            <img src="/images/patient-icon.png" alt="Patient List" class="nav-icon">
                            <span>Patient List</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">

            <h2 class="page-title">Clinical Oral Surgery</h2>

            <div class="form-card">
                <div class="form-banner">Odontectomy Case Patient Workup Form</div>

                <form th:object="${chart}" action="#" method="post">
                <div class="form-body">

                    <!-- Chart No. -->
                    <div class="form-group">
                        <label>Chart No.</label>
                        <input type="text" th:value="${chart.chartNo}" class="input-medium" readonly>
                    </div>

                    <!-- Clinician + Date -->
                    <div class="form-row">
                        <div class="form-group">
                            <label>Clinician</label>
                            <input type="text" th:value="${chart.clinician != null ? chart.clinician.fullName : ''}" readonly>
                        </div>
                        <div class="form-group">
                            <label>Date</label>
                            <input type="date" th:field="*{odontectomyDate}" class="date-picker" readonly>
                        </div>
                    </div>

                    <!-- Patient Name -->
                    <div class="form-group">
                        <label>Patient Name</label>
                        <div class="split-input">
                            <input type="text" th:value="${chart.patient.surname}" readonly>
                            <input type="text" th:value="${chart.patient.firstName}" class="input-wide" readonly>
                            <input type="text" th:value="${chart.patient.middleInitial}" class="input-narrow" readonly>
                        </div>
                    </div>

                    <!-- Age, Sex -->
                    <div class="form-row row-small">
                        <div class="form-group">
                            <label>Age</label>
                            <input type="text" th:value="${chart.patient.age}" readonly>
                        </div>
                        <div class="form-group">
                            <label>Sex</label>
                            <input type="text" th:value="${chart.patient.sex}" readonly>
                        </div>
                    </div>

                    <!-- Chief Complaint -->
                    <div class="form-group">
                        <label>Chief Complaint</label>
                        <textarea th:field="*{chiefComplaint}" rows="2" readonly></textarea>
                    </div>

                    <!-- History of Present Illness -->
                    <div class="form-group">
                        <label>History of Present Illness</label>
                        <textarea th:field="*{historyOfPresentIllness}" rows="2" readonly></textarea>
                    </div>

                    <!-- Clinical Findings -->
                    <div class="form-group">
                        <label>Clinical Findings</label>
                        <textarea th:field="*{clinicalFindings}" rows="2" readonly></textarea>
                    </div>

                    <!-- Radiographic Findings + Classification of Impaction -->
                    <div class="form-row">
                        <div class="form-group">
                            <label>Radiographic Findings</label>
                            <textarea th:field="*{odontectomyRadiographicFindings}" rows="3" readonly></textarea>
                        </div>
                        <div class="form-group">
                            <label>Classification of Impaction</label>
                            <textarea th:field="*{classificationOfImpaction}" rows="3" readonly></textarea>
                        </div>
                    </div>

                    <!-- Diagnosis & Treatment Plan -->
                    <div class="form-group">
                        <label>Diagnosis &amp; Treatment Plan</label>
                        <textarea th:field="*{diagnosisTreatmentPlan}" rows="2" readonly></textarea>
                    </div>

                    <!-- Patient Workup Checklist -->
                    <div class="checklist-section">
                        <h3 class="checklist-title">Patient Workup Checklist</h3>
                        <div class="checklist-grid">
                            <label class="checkbox-label"><input type="checkbox" th:field="*{hasAsChart}" disabled> AS Chart</label>
                            <div></div>
                            <label class="checkbox-label"><input type="checkbox" th:field="*{hasIntraoralPhoto}" disabled> Intraoral Photo/s</label>
                            <div></div>
                            <div class="checklist-inline">
                                <label class="checkbox-label"><input type="checkbox" th:field="*{hasRadiograph}" disabled> Radiograph</label>
                                <select th:field="*{radiographType}" class="select-input select-small" disabled>
                                    <option value="">Indicate what type</option>
                                    <option value="periapical">Periapical</option>
                                    <option value="panoramic">Panoramic</option>
                                </select>
                            </div>
                            <div></div>
                            <label class="checkbox-label"><input type="checkbox" th:field="*{hasImpression}" disabled> Impression/Diagnostic Cast</label>
                            <div></div>
                            <div class="checklist-inline">
                                <label class="checkbox-label"><input type="checkbox" th:field="*{hasOtherDiagnosticAids}" disabled> Other supplemental diagnostic aids</label>
                                <input type="text" th:field="*{otherDiagnosticAids}" class="input-inline" readonly>
                            </div>
                            <div></div>
                        </div>
                    </div>

                    <!-- Patient Workup Checked By -->
                    <div class="form-group">
                        <label>Patient Workup Checked By:</label>
                        <input type="text" th:field="*{checkedBy}" class="input-medium" readonly>
                    </div>

                </div>
                </form>
            </div>
        </main>
    </div>
</div>

<script>
document.querySelector('.menu-icon').onclick = function() {
    document.querySelector('.sidebar').classList.toggle('expanded');
};
document.querySelector('.user-profile').onclick = function(e) {
    e.stopPropagation();
    document.querySelector('.user-dropdown').classList.toggle('show');
};
document.addEventListener('click', function() {
    const dropdown = document.querySelector('.user-dropdown');
    if (dropdown.classList.contains('show')) dropdown.classList.remove('show');
});
document.querySelector('.user-dropdown').addEventListener('click', function(e) {
    e.stopPropagation();
});
</script>

</body>
</html>
