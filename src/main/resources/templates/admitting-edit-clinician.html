<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Patient - DentIS</title>
    <link rel="stylesheet" href="/css/admitting-view-clinician.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>
<div class="background"></div>
<div class="admitting-view">
    <header class="header">
        <div class="header-left">
            <div class="logo">
                <div class="menu-icon">&#9776;</div>
                <img src="/images/UPMlogo.png" alt="UPM Logo" class="upm-logo">
                <h1>DentIS</h1>
            </div>
        </div>
        <div class="header-right">
            <div class="user-profile">
                <div class="user-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                        <path d="M12 12C14.21 12 16 10.21 16 8C16 5.79 14.21 4 12 4C9.79 4 8 5.79 8 8C8 10.21 9.79 12 12 12Z" fill="currentColor"/>
                        <path d="M12 14C7.59 14 4 17.59 4 22H20C20 17.59 16.41 14 12 14Z" fill="currentColor"/>
                    </svg>
                </div>
                <span class="username" th:text="${currentUser != null ? currentUser.fullName + ' (' + currentUser.role.displayName + ')' : 'Guest'}">User</span>
                <div class="dropdown-icon">▼</div>
                <div class="user-dropdown">
                    <a href="/logout" class="dropdown-item">Logout</a>
                </div>
            </div>
        </div>
    </header>

    <div class="main-container">
        <aside class="sidebar">
            <nav class="nav-menu">
                <ul>
                    <li class="nav-item">
                        <a href="/clinician-dashboard" class="nav-link">
                            <img src="/images/home-icon.png" alt="Home" class="nav-icon">
                            <span>Home</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/chartrequest-clinician" class="nav-link">
                            <img src="/images/request-icon.png" alt="Chart" class="nav-icon2">
                            <span>Chart Request</span>
                        </a>
                    </li>
                    <li class="nav-item active">
                        <a href="/patientlist-clinician" class="nav-link">
                            <img src="/images/patient-icon.png" alt="Patient" class="nav-icon">
                            <span>Patient List</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">

            <form th:action="@{/admitting-edit-clinician/{id}(id=${patient.id})}" th:object="${patient}" method="post">
            <div class="form-card">

                <div class="sub-header">Personal Information</div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Registration Date</label>
                        <div class="field-value" th:text="${patient.registrationDate}">—</div>
                    </div>
                    <div class="form-group">
                        <label>Chart No.</label>
                        <div class="field-value" th:text="${patient.chartNo}">—</div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group full-width">
                        <label>Patient Name</label>
                        <div class="field-value" th:text="${patient.surname + ', ' + patient.firstName + (patient.middleInitial != null ? ' ' + patient.middleInitial + '.' : '')}">—</div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Age</label>
                        <input type="number" th:field="*{age}" class="field-input">
                    </div>
                    <div class="form-group">
                        <label>Birthdate</label>
                        <input type="date" th:field="*{birthdate}" class="field-input">
                    </div>
                    <div class="form-group">
                        <label>Sex</label>
                        <select th:field="*{sex}" class="field-input">
                            <option value="">Select</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group full-width">
                        <label>Address</label>
                        <input type="text" th:field="*{address}" class="field-input">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Contact Number</label>
                        <input type="text" th:field="*{contactNumber}" class="field-input">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" th:field="*{email}" class="field-input">
                    </div>
                    <div class="form-group">
                        <label>Civil Status</label>
                        <select th:field="*{civilStatus}" class="field-input">
                            <option value="">Select</option>
                            <option value="Single">Single</option>
                            <option value="Married">Married</option>
                            <option value="Widowed">Widowed</option>
                            <option value="Separated">Separated</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Occupation</label>
                        <input type="text" th:field="*{occupation}" class="field-input">
                    </div>
                    <div class="form-group">
                        <label>Educational Attainment</label>
                        <input type="text" th:field="*{educationalAttainment}" class="field-input">
                    </div>
                </div>

                <h3 class="section-title">In case of emergency</h3>

                <div class="form-row">
                    <div class="form-group">
                        <label>Contact Person</label>
                        <input type="text" th:field="*{emergencyContactName}" class="field-input">
                    </div>
                    <div class="form-group">
                        <label>Relationship</label>
                        <input type="text" th:field="*{emergencyContactRelation}" class="field-input">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group form-group-small">
                        <label>Contact Number</label>
                        <input type="text" th:field="*{emergencyContactNumber}" class="field-input">
                    </div>
                </div>

                <h3 class="section-title">Chief Complaint</h3>

                <div class="form-row">
                    <div class="form-group full-width">
                        <textarea th:field="*{chiefComplaint}" class="field-input-area" rows="3"></textarea>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group form-group-small">
                        <label>Service Code</label>
                        <input type="text" th:field="*{serviceCode}" class="field-input">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group full-width">
                        <label>Proposed Treatment Plan</label>
                        <textarea th:field="*{proposedTreatmentPlan}" class="field-input-area" rows="3"></textarea>
                    </div>
                </div>

                <div class="form-row" style="justify-content:flex-end; padding: 10px 0;">
                    <button type="submit" class="btn-save">Save Changes</button>
                </div>

                <div class="form-bottom-spacer"></div>
            </div>
            </form>
        </main>
    </div>
</div>

<script>
document.querySelector('.menu-icon').onclick = function() {
    document.querySelector('.sidebar').classList.toggle('expanded');
};
document.querySelector('.user-profile').onclick = function(e) {
    e.stopPropagation();
    document.querySelector('.user-dropdown').classList.toggle('show');
};
document.addEventListener('click', function() {
    const dropdown = document.querySelector('.user-dropdown');
    if (dropdown.classList.contains('show')) dropdown.classList.remove('show');
});
document.querySelector('.user-dropdown').addEventListener('click', function(e) {
    e.stopPropagation();
});
</script>

</body>
</html>
