<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Patient Details - DentIS</title>
    <link rel="stylesheet" href="/css/admitting-view-clinician.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>
<div class="background"></div>
<div class="admitting-view">
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <div class="logo">
                <div class="menu-icon">&#9776;</div>
                <img src="/images/UPMlogo.png" alt="UPM Logo" class="upm-logo">
                <h1>DentIS</h1>
            </div>
        </div>
        <div class="header-right">
            <div class="user-profile">
                <div class="user-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                        <path d="M12 12C14.21 12 16 10.21 16 8C16 5.79 14.21 4 12 4C9.79 4 8 5.79 8 8C8 10.21 9.79 12 12 12Z" fill="currentColor"/>
                        <path d="M12 14C7.59 14 4 17.59 4 22H20C20 17.59 16.41 14 12 14Z" fill="currentColor"/>
                    </svg>
                </div>
                <span class="username" th:text="${currentUser != null ? currentUser.firstName + ' ' + currentUser.lastName + ' (' + currentUser.role.displayName + ')' : 'Guest'}">User</span>
                <div class="dropdown-icon">▼</div>
                <div class="user-dropdown">
                    <a href="/logout" class="dropdown-item">Logout</a>
                </div>
            </div>
        </div>
    </header>

    <div class="main-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <nav class="nav-menu">
                <ul>
                    <li class="nav-item">
                        <a href="/clinician-dashboard" class="nav-link">
                            <img src="/images/home-icon.png" alt="Home" class="nav-icon">
                            <span>Home</span>
                        </a>
                    </li>
                    <li class="nav-item active">
                        <a href="/chartrequest-clinician" class="nav-link">
                            <img src="/images/request-icon.png" alt="Chart" class="nav-icon2">
                            <span>Chart Request</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/patientlist-clinician" class="nav-link">
                            <img src="/images/patient-icon.png" alt="Patient" class="nav-icon">
                            <span>Patient List</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">

            <a href="/chartrequest-clinician" class="btn-back">&#8592; Back to Chart Request</a>

            <div class="form-card">

                <!-- Personal Information Sub-header -->
                <div class="sub-header">Personal Information</div>

                <!-- Registration Date + Chart No. -->
                <div class="form-row">
                    <div class="form-group">
                        <label>Registration Date</label>
                        <div class="field-value" th:text="${patient.registrationDate}">—</div>
                    </div>
                    <div class="form-group">
                        <label>Chart No.</label>
                        <div class="field-value" th:text="${patient.chartNo}">—</div>
                    </div>
                </div>

                <!-- Patient Name -->
                <div class="form-row">
                    <div class="form-group full-width">
                        <label>Patient Name</label>
                        <div class="field-value" th:text="${patient.surname + ', ' + patient.firstName + (patient.middleInitial != null ? ' ' + patient.middleInitial + '.' : '')}">—</div>
                    </div>
                </div>

                <!-- Age, Birthdate, Sex -->
                <div class="form-row">
                    <div class="form-group">
                        <label>Age</label>
                        <div class="field-value" th:text="${patient.age}">—</div>
                    </div>
                    <div class="form-group">
                        <label>Birthdate</label>
                        <div class="field-value" th:text="${patient.birthdate}">—</div>
                    </div>
                    <div class="form-group">
                        <label>Sex</label>
                        <div class="field-value" th:text="${patient.sex}">—</div>
                    </div>
                </div>

                <!-- Address -->
                <div class="form-row">
                    <div class="form-group full-width">
                        <label>Address</label>
                        <div class="field-value" th:text="${patient.address}">—</div>
                    </div>
                </div>

                <!-- Contact Number, Email, Civil Status -->
                <div class="form-row">
                    <div class="form-group">
                        <label>Contact Number</label>
                        <div class="field-value" th:text="${patient.contactNumber}">—</div>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <div class="field-value" th:text="${patient.email}">—</div>
                    </div>
                    <div class="form-group">
                        <label>Civil Status</label>
                        <div class="field-value" th:text="${patient.civilStatus}">—</div>
                    </div>
                </div>

                <!-- Occupation, Educational Attainment -->
                <div class="form-row">
                    <div class="form-group">
                        <label>Occupation</label>
                        <div class="field-value" th:text="${patient.occupation}">—</div>
                    </div>
                    <div class="form-group">
                        <label>Educational Attainment</label>
                        <div class="field-value" th:text="${patient.educationalAttainment}">—</div>
                    </div>
                </div>

                <!-- In case of emergency -->
                <h3 class="section-title">In case of emergency</h3>

                <div class="form-row">
                    <div class="form-group">
                        <label>Contact Person</label>
                        <div class="field-value" th:text="${patient.emergencyContactName}">—</div>
                    </div>
                    <div class="form-group">
                        <label>Relationship</label>
                        <div class="field-value" th:text="${patient.emergencyContactRelation}">—</div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group form-group-small">
                        <label>Contact Number</label>
                        <div class="field-value" th:text="${patient.emergencyContactNumber}">—</div>
                    </div>
                </div>

                <!-- Chief Complaint -->
                <h3 class="section-title">Chief Complaint</h3>

                <div class="form-row">
                    <div class="form-group full-width">
                        <label>Description</label>
                        <div class="field-value field-value-area" th:text="${patient.chiefComplaint}">—</div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group form-group-small">
                        <label>Service Code</label>
                        <div class="field-value" th:text="${patient.serviceCode}">—</div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group full-width">
                        <label>Proposed Treatment Plan</label>
                        <div class="field-value field-value-area" th:text="${patient.proposedTreatmentPlan}">—</div>
                    </div>
                </div>

                <div class="form-bottom-spacer"></div>

            </div>
        </main>
    </div>
</div>

<script>
document.querySelector('.menu-icon').onclick = function() {
    document.querySelector('.sidebar').classList.toggle('expanded');
};

document.querySelector('.user-profile').onclick = function(e) {
    e.stopPropagation();
    document.querySelector('.user-dropdown').classList.toggle('show');
};

document.addEventListener('click', function() {
    const dropdown = document.querySelector('.user-dropdown');
    if (dropdown.classList.contains('show')) dropdown.classList.remove('show');
});

document.querySelector('.user-dropdown').addEventListener('click', function(e) {
    e.stopPropagation();
});
</script>

</body>
</html>
