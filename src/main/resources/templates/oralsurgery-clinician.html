<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Clinical Oral Surgery - DentIS</title>
    <link rel="stylesheet" href="/css/oralsurgery-clinician.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>
<div class="background"></div>
<div class="oralsurgery-page">
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <div class="logo">
                <div class="menu-icon">&#9776;</div>
                <img src="/images/UPMlogo.png" alt="UPM Logo" class="upm-logo">
                <h1>DentIS</h1>
            </div>
        </div>
        <div class="header-right">
            <div class="user-profile">
                <div class="user-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                        <path d="M12 12C14.21 12 16 10.21 16 8C16 5.79 14.21 4 12 4C9.79 4 8 5.79 8 8C8 10.21 9.79 12 12 12Z" fill="currentColor"/>
                        <path d="M12 14C7.59 14 4 17.59 4 22H20C20 17.59 16.41 14 12 14Z" fill="currentColor"/>
                    </svg>
                </div>
                <span class="username" th:text="${currentUser != null ? currentUser.fullName + ' (' + currentUser.role.displayName + ')' : 'Guest'}">User</span>
                <div class="dropdown-icon">&#9660;</div>
                <div class="user-dropdown">
                    <a href="/logout" class="dropdown-item">Logout</a>
                </div>
            </div>
        </div>
    </header>

    <div class="main-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <nav class="nav-menu">
                <ul>
                    <li class="nav-item">
                        <a href="/clinician-dashboard" class="nav-link">
                            <img src="/images/home-icon.png" alt="Home" class="nav-icon">
                            <span>Home</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/chartrequest-clinician" class="nav-link">
                            <img src="/images/request-icon.png" alt="Chart" class="nav-icon2">
                            <span>Chart Request</span>
                        </a>
                    </li>
                    <li class="nav-item active">
                        <a href="/patientlist-clinician" class="nav-link">
                            <img src="/images/patient-icon.png" alt="Patient" class="nav-icon">
                            <span>Patient List</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">

            <a th:href="@{/chartsview-clinician/{id}(id=${chart.patient.id})}" class="btn-back">&#8592; Back to Patient Charts</a>

            <h2 class="page-title">Clinical Oral Surgery</h2>

            <div class="form-card">
                <div class="form-banner">Patient Workup Form</div>

                <form th:action="@{/oralsurgery-clinician/{id}(id=${chart.id})}" th:object="${chart}" method="post">
                <div class="form-body">

                    <!-- Chart No. -->
                    <div class="form-group">
                        <label>Chart No.</label>
                        <input type="text" th:value="${chart.chartNo}" class="input-medium" readonly>
                    </div>

                    <!-- Patient Name -->
                    <div class="form-group">
                        <label>Patient Name</label>
                        <div class="split-input">
                            <input type="text" th:value="${chart.patient.surname}" readonly>
                            <input type="text" th:value="${chart.patient.firstName}" class="input-wide" readonly>
                            <input type="text" th:value="${chart.patient.middleInitial}" class="input-narrow" readonly>
                        </div>
                    </div>

                    <!-- Age + Sex -->
                    <div class="form-row row-small">
                        <div class="form-group">
                            <label>Age</label>
                            <input type="text" th:value="${chart.patient.age}" readonly>
                        </div>
                        <div class="form-group">
                            <label>Sex</label>
                            <input type="text" th:value="${chart.patient.sex}" readonly>
                        </div>
                    </div>

                    <!-- Chief Complaint -->
                    <div class="form-group">
                        <label>Chief Complaint</label>
                        <textarea th:field="*{chiefComplaint}" rows="3" placeholder="Value"></textarea>
                    </div>

                    <!-- History of Present Illness -->
                    <div class="form-group">
                        <label>History of Present Illness</label>
                        <textarea th:field="*{historyOfPresentIllness}" rows="3" placeholder="Value"></textarea>
                    </div>

                    <!-- Pain History -->
                    <div class="pain-section">
                        <h3 class="section-label">Pain History</h3>

                        <div class="pain-row">
                            <div class="pain-tag">Type</div>
                            <div class="pain-options">
                                <label class="checkbox-label"><input type="checkbox" th:field="*{painMild}"> Mild</label>
                                <label class="checkbox-label"><input type="checkbox" th:field="*{painSevere}"> Severe</label>
                                <label class="checkbox-label"><input type="checkbox" th:field="*{painThrobbing}"> Throbbing</label>
                                <label class="checkbox-label"><input type="checkbox" th:field="*{painDull}"> Dull</label>
                                <label class="checkbox-label"><input type="checkbox" th:field="*{painSharp}"> Sharp</label>
                            </div>
                        </div>

                        <div class="pain-row">
                            <div class="pain-tag">Onset</div>
                            <div class="pain-options">
                                <label class="checkbox-label"><input type="checkbox" th:field="*{painProvoked}"> Provoked</label>
                                <label class="checkbox-label"><input type="checkbox" th:field="*{painUnprovoked}"> Unprovoked</label>
                            </div>
                        </div>

                        <div class="pain-row">
                            <div class="pain-tag">Duration</div>
                            <div class="pain-options">
                                <label class="checkbox-label"><input type="checkbox" th:field="*{painProlonged}"> Prolonged</label>
                                <label class="checkbox-label"><input type="checkbox" th:field="*{painIntermittent}"> Intermittent</label>
                            </div>
                        </div>

                        <div class="pain-row">
                            <div class="pain-tag">Caused By</div>
                            <div class="pain-options">
                                <label class="checkbox-label"><input type="checkbox" th:field="*{painHeat}"> Heat</label>
                                <label class="checkbox-label"><input type="checkbox" th:field="*{painCold}"> Cold</label>
                                <label class="checkbox-label"><input type="checkbox" th:field="*{painPercussion}"> Percussion</label>
                                <label class="checkbox-label"><input type="checkbox" th:field="*{painPalpation}"> Palpation</label>
                                <label class="checkbox-label"><input type="checkbox" th:field="*{painTactile}"> Tactile</label>
                            </div>
                        </div>

                        <div class="pain-row others-row">
                            <label class="checkbox-label">Others:</label>
                            <input type="text" th:field="*{painOthers}" placeholder="Value" class="others-input">
                        </div>
                    </div>

                    <!-- Vital Signs -->
                    <div class="vital-section">
                        <h3 class="section-label">Vital Signs</h3>
                        <div class="vital-row">
                            <div class="vital-group">
                                <label>BP</label>
                                <input type="text" th:field="*{bp}" placeholder="Value">
                            </div>
                            <div class="vital-group">
                                <label>PR</label>
                                <input type="text" th:field="*{pr}" placeholder="Value">
                            </div>
                            <div class="vital-group">
                                <label>RR</label>
                                <input type="text" th:field="*{rr}" placeholder="Value">
                            </div>
                            <div class="vital-group">
                                <label>Temp</label>
                                <input type="text" th:field="*{temp}" placeholder="Value">
                            </div>
                            <div class="vital-group">
                                <label>O<sub>2</sub> Sat</label>
                                <input type="text" th:field="*{o2Sat}" placeholder="Value">
                            </div>
                        </div>
                    </div>

                    <!-- Physical & Oral Exam -->
                    <div class="form-group">
                        <label>Physical &amp; Oral Exam</label>
                        <textarea th:field="*{physicalOralExam}" rows="2" placeholder="Value"></textarea>
                    </div>

                    <!-- Intraoral Exam -->
                    <div class="form-group">
                        <label>Intraoral Exam</label>
                        <textarea th:field="*{intraoralExam}" rows="2" placeholder="Value"></textarea>
                    </div>

                    <!-- Radiographic Findings -->
                    <div class="form-group">
                        <label>Radiographic Findings</label>
                        <textarea th:field="*{radiographicFindings}" rows="2" placeholder="Value"></textarea>
                    </div>

                    <!-- Diagnosis + Tooth Number -->
                    <div class="form-row">
                        <div class="form-group">
                            <label>Diagnosis</label>
                            <textarea th:field="*{diagnosis}" rows="2" placeholder="Value"></textarea>
                        </div>
                        <div class="form-group">
                            <label>Tooth Number</label>
                            <input type="text" th:field="*{toothNumber}" placeholder="e.g. 18">
                        </div>
                    </div>

                    <!-- Treatment -->
                    <div class="form-group">
                        <label>Treatment</label>
                        <textarea th:field="*{treatment}" rows="2" placeholder="Value"></textarea>
                    </div>

                    <!-- Follow-up -->
                    <div class="form-group">
                        <label>Follow-up <span class="label-note">as needed</span></label>
                        <textarea th:field="*{followUp}" rows="2" placeholder="Value"></textarea>
                    </div>

                    <!-- Date, Clinician, Faculty -->
                    <div class="form-row">
                        <div class="form-group">
                            <label>Date</label>
                            <input type="date" th:field="*{visitDate}" class="date-picker">
                        </div>
                        <div class="form-group">
                            <label>Clinician</label>
                            <input type="text" th:value="${chart.clinician != null ? chart.clinician.fullName : ''}" readonly>
                        </div>
                        <div class="form-group">
                            <label>Faculty</label>
                            <input type="text" th:value="${chart.faculty != null ? chart.faculty.fullName : ''}" readonly>
                        </div>
                    </div>

                    <!-- Next Button -->
                    <div class="form-actions">
                        <button type="submit" class="btn-next">Save &amp; Next</button>
                    </div>

                </div>
                </form>
            </div>
        </main>
    </div>
</div>

<script>
document.querySelector('.menu-icon').onclick = function() {
    document.querySelector('.sidebar').classList.toggle('expanded');
};

document.querySelector('.user-profile').onclick = function(e) {
    e.stopPropagation();
    document.querySelector('.user-dropdown').classList.toggle('show');
};

document.addEventListener('click', function() {
    const dropdown = document.querySelector('.user-dropdown');
    if (dropdown.classList.contains('show')) dropdown.classList.remove('show');
});

document.querySelector('.user-dropdown').addEventListener('click', function(e) {
    e.stopPropagation();
});
</script>

</body>
</html>
