<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Assign Patients - Faculty</title>
    <link rel="stylesheet" href="/css/dashboard-faculty.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>
<div class="background"></div>
<div class="faculty-dashboard">

    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <div class="logo">
                <div class="menu-icon">&#9776;</div>
                <img src="/images/UPMlogo.png" alt="UPM Logo" class="upm-logo">
                <h1>DentIS</h1>
            </div>
        </div>
        <div class="header-right">
            <div class="user-profile">
                <div class="user-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                        <path d="M12 12C14.21 12 16 10.21 16 8C16 5.79 14.21 4 12 4C9.79 4 8 5.79 8 8C8 10.21 9.79 12 12 12Z" fill="currentColor"/>
                        <path d="M12 14C7.59 14 4 17.59 4 22H20C20 17.59 16.41 14 12 14Z" fill="currentColor"/>
                    </svg>
                </div>
                <span class="username" th:text="${currentUser != null ? currentUser.fullName + ' (' + currentUser.role.displayName + ')' : 'Guest'}">User</span>
                <div class="dropdown-icon">▼</div>
                <div class="user-dropdown">
                    <a href="/logout" class="dropdown-item">Logout</a>
                </div>
            </div>
        </div>
    </header>

    <div class="main-container">

        <!-- Sidebar -->
        <aside class="sidebar">
            <nav class="nav-menu">
                <ul>
                    <li class="nav-item">
                        <a href="/faculty-dashboard" class="nav-link">
                            <img src="/images/home-icon.png" alt="Home" class="nav-icon">
                            <span>Home</span>
                        </a>
                    </li>
                    <li class="nav-item active">
                        <a href="/faculty-assign" class="nav-link">
                            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M17 21V19C17 17.9 16.1 17 15 17H9C7.9 17 7 17.9 7 19V21" stroke="#333" stroke-width="2" stroke-linecap="round"/>
                                <circle cx="12" cy="11" r="3" stroke="#333" stroke-width="2"/>
                                <path d="M19 8L21 10L19 12" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M21 10H16" stroke="#333" stroke-width="2" stroke-linecap="round"/>
                            </svg>
                            <span>Assign Patients</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/faculty-patientlist" class="nav-link">
                            <img src="/images/patient-icon.png" alt="Patient List" class="nav-icon">
                            <span>Patient List</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/faculty-advisees" class="nav-link">
                            <img src="/images/chart-icon.png" alt="My Advisees" class="nav-icon">
                            <span>My Advisees</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <section class="section">
                <div class="section-header">
                    <h2>Assign Patients</h2>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Chart No.</th>
                                <th>Patient Name</th>
                                <th>Contact Number</th>
                                <th>Email</th>
                                <th>Assign Clinician</th>
                                <th>View Chart</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="patient : ${patients}">
                                <td th:text="${patient.chartNo}"></td>
                                <td th:text="${patient.surname + ', ' + patient.firstName + (patient.middleInitial != null ? ' ' + patient.middleInitial + '.' : '')}"></td>
                                <td th:text="${patient.contactNumber}"></td>
                                <td th:text="${patient.email}"></td>
                                <td>
                                    <form th:action="@{/faculty-dashboard/{id}/assign-clinician(id=${patient.id})}" method="post" style="display:flex; gap:6px; align-items:center; justify-content:center;">
                                        <input type="hidden" name="returnTo" value="faculty-assign">
                                        <select name="clinicianId" style="font-size:13px; padding:4px 8px; border:1px solid #ccc; border-radius:4px;">
                                            <option value="">Select Clinician</option>
                                            <option th:each="c : ${clinicians}"
                                                    th:value="${c.id}"
                                                    th:text="${c.fullName}"></option>
                                        </select>
                                        <button type="submit" class="btn-accept">Assign</button>
                                    </form>
                                </td>
                                <td>
                                    <a th:href="@{/admitting-view-faculty/{id}(id=${patient.id})}" class="btn-view">View Chart</a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(patients)}">
                                <td colspan="6" style="text-align:center; color:#888;">No unassigned patients.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
</div>

<script>
document.querySelector('.menu-icon').onclick = function() {
    document.querySelector('.sidebar').classList.toggle('expanded');
};

document.querySelector('.user-profile').onclick = function(e) {
    e.stopPropagation();
    document.querySelector('.user-dropdown').classList.toggle('show');
};

document.addEventListener('click', function() {
    const dropdown = document.querySelector('.user-dropdown');
    if (dropdown.classList.contains('show')) dropdown.classList.remove('show');
});

document.querySelector('.user-dropdown').addEventListener('click', function(e) {
    e.stopPropagation();
});

</script>

</body>
</html>
