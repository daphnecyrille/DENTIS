spring.application.name=DENTIS

# --- Supabase (Postgres) datasource ---
# Project: dentis-dev (ap-southeast-1 / Singapore)
# Using Supabase's Session pooler — supports prepared statements (required by Hibernate).
# Override SUPABASE_DB_PASSWORD via env var or src/main/resources/application-local.properties (gitignored).
spring.datasource.url=jdbc:postgresql://db.xafwhuiaelmkbljwxngf.supabase.co:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=${SUPABASE_DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
# Dialect is auto-detected from the JDBC connection — no need to set it explicitly.
# 'update' auto-creates / alters tables to match @Entity classes. Switch to 'validate' or use migrations once the schema stabilizes.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Disable open-in-view: keeps DB transactions inside @Service methods only (best practice).
spring.jpa.open-in-view=false

# --- Connection pool sizing for Supabase free tier (60 max connections shared) ---
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

# --- Google OAuth2 ---
# client-id and client-secret are set in application-local.properties (gitignored)
spring.security.oauth2.client.registration.google.scope=email,profile

# --- Allow local-only overrides without committing them ---
spring.profiles.active=local
spring.config.import=optional:classpath:application-local.properties

# --- Session ---
server.servlet.session.timeout=24h
