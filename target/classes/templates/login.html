<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DentIS Login</title>

<link rel="stylesheet" href="/css/login.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="background"></div>

<div class="login-wrapper">

    <!-- LEFT SIDE -->
    <div class="left-panel">

        <h1>DentIS</h1>
        <p>Dental Information System for UP College of Dentistry</p>

        <div class="logos">
            <img src="/images/UPMlogo.png" alt="UPM Logo">
            <img src="/images/UPCDLogo.png" alt="Dentistry Logo">
        </div>

    </div>


    <!-- RIGHT SIDE -->
    <div class="right-panel">

        <h2>Welcome</h2>
        <p>Sign in with your account to continue</p>

        <a href="/clinician-dashboard" class="google-btn-link">
            <button class="google-btn">
                <img src="/images/GoogleLogo.png" alt="Google">
                Login with Google
            </button>
        </a>

    </div>

</div>

</body>
</html>
